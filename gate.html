<!--=== 10-s INLINE GATE ===-->
<style>
  #gate-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);color:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:sans-serif;font-size:2rem}
  #gate-timer{background:#111;padding:1rem 2rem;border-radius:.5rem}
</style>
<div id="gate-overlay">
  <div id="gate-timer">Aguarde <span id="cnt">10</span> s…</div>
</div>
<script>
  (function(){
    /* --- limpa pegadas --- */
    document.cookie = "lc_gate=; path=/; max-age=0";
    /* --- marca como "já passei" --- */
    document.cookie = "lc_visited=1; path=/; max-age=3600";
    let t=10, c=document.getElementById('cnt');
    let x=setInterval(()=>{
      c.textContent=--t;
      if(t<=0){ clearInterval(x); window.location.href="https://lc-s.co/URSti"; }
    },1000);
  })();
</script>
<!--=== fim GATE ===-->
